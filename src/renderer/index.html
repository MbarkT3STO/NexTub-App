<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self'" />
  <title>NexTub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="styles/main.css" />
  <style>html{background:#1c1c1e}html[data-theme="light"]{background:#f2f2f7}</style>
</head>
<body>
  <header class="titlebar">
    <div class="titlebar__inner">
      <div class="titlebar__left">
        <div class="logo">
        <div class="logo__mark"><i class="fa-brands fa-youtube"></i></div>
          <div class="logo__text">
            <span class="logo__name">NexTub</span>
            <span class="logo__tag">Downloader</span>
          </div>
        </div>
      </div>
      <div class="titlebar__center">
        <nav class="tab-nav" role="tablist">
          <button class="tab-btn tab-btn--active" role="tab" aria-selected="true" data-tab="downloader">
            <i class="fa-solid fa-download"></i><span>Download</span>
          </button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="history">
            <i class="fa-solid fa-clock-rotate-left"></i><span>History</span>
          </button>
        </nav>
      </div>
      <div class="titlebar__right">
        <button class="icon-btn" id="openDirBtn" title="Open downloads folder">
          <i class="fa-solid fa-folder-open"></i>
        </button>
        <button class="icon-btn" id="themeToggle" title="Toggle theme">
          <i class="fa-solid fa-sun icon-sun"></i>
          <i class="fa-solid fa-moon icon-moon"></i>
        </button>
        <div class="wc-group">
          <button class="wc-btn wc-btn--close" id="btnClose" title="Close"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <section id="tab-downloader" class="tab-panel tab-panel--active" role="tabpanel">
      <div class="card">
        <div class="card__label">
          <i class="fa-brands fa-youtube"></i><span>YouTube URL</span>
        </div>
        <div class="url-row">
          <div class="input-wrap" id="urlInputWrapper">
            <i class="fa-solid fa-link input-icon"></i>
            <input id="urlInput" class="url-input" type="url"
              placeholder="Paste a YouTube link here..." autocomplete="off" spellcheck="false" />
            <button class="clear-btn" id="clearUrlBtn" hidden aria-label="Clear">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
          <button class="btn btn--primary" id="fetchBtn">
            <i class="fa-solid fa-magnifying-glass"></i><span>Fetch</span>
          </button>
        </div>
        <p class="error-msg" id="urlError" role="alert" aria-live="polite"></p>
      </div>

      <div class="card card--preview" id="previewCard" hidden>
        <div class="preview-hero">
          <div class="thumb-wrap">
            <img id="thumbnail" class="thumb" src="" alt="Video thumbnail" />
            <div class="thumb-overlay">
              <div class="thumb-play"><i class="fa-solid fa-play"></i></div>
            </div>
            <span class="duration-badge" id="durationBadge">0:00</span>
          </div>
          <div class="video-meta">
            <span class="platform-pill"><i class="fa-brands fa-youtube"></i> YouTube</span>
            <h2 class="video-title" id="videoTitle">Video Title</h2>
            <p class="video-author" id="videoAuthor">
              <i class="fa-solid fa-user"></i><span></span>
            </p>
            <div class="save-loc">
              <i class="fa-solid fa-folder-closed"></i>
              <span class="save-loc__path" id="downloadDirText">~/Downloads</span>
              <button class="pill-btn" id="changeDirBtn">
                <i class="fa-solid fa-pen"></i> Change
              </button>
            </div>
          </div>
        </div>
        <div class="options-row">
          <div class="opt-group">
            <label class="opt-label" for="qualitySelect">
              <i class="fa-solid fa-sliders"></i> Quality
            </label>
            <div class="select-wrap">
              <select id="qualitySelect" class="select">
                <option value="best">Best available</option>
                <option value="1080p">1080p Full HD</option>
                <option value="720p" selected>720p HD</option>
                <option value="480p">480p SD</option>
                <option value="360p">360p Low</option>
              </select>
              <i class="fa-solid fa-chevron-down select-arrow"></i>
            </div>
          </div>
          <div class="opt-group opt-group--grow">
            <label class="opt-label">
              <i class="fa-solid fa-file-export"></i> Output file
            </label>
            <div class="filename-box">
              <i class="fa-solid fa-file-video" id="filenameIcon"></i>
              <span id="filenameText" class="filename-text">filename.mp4</span>
            </div>
          </div>
        </div>
        <div class="action-row" id="actionRow" hidden>
          <button class="dl-btn dl-btn--video" id="downloadVideoBtn">
            <div class="dl-btn__icon"><i class="fa-solid fa-film"></i></div>
            <div class="dl-btn__body">
              <span class="dl-btn__label">Download MP4</span>
              <span class="dl-btn__sub">Video + Audio</span>
            </div>
            <i class="fa-solid fa-arrow-right dl-btn__arrow"></i>
          </button>
          <button class="dl-btn dl-btn--audio" id="downloadAudioBtn">
            <div class="dl-btn__icon"><i class="fa-solid fa-music"></i></div>
            <div class="dl-btn__body">
              <span class="dl-btn__label">Extract MP3</span>
              <span class="dl-btn__sub">320 kbps Audio</span>
            </div>
            <i class="fa-solid fa-arrow-right dl-btn__arrow"></i>
          </button>
        </div>
      </div>
    </section>

    <section id="tab-history" class="tab-panel" role="tabpanel" hidden>
      <div class="history-header">
        <div class="history-header__left">
          <h2 class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> History</h2>
          <span class="count-pill" id="historyCount">0 items</span>
        </div>
        <button class="ghost-btn" id="clearHistoryBtn">
          <i class="fa-solid fa-trash-can"></i> Clear All
        </button>
      </div>
      <div class="history-list" id="historyList" role="list">
        <div class="empty-state" id="historyEmpty" hidden>
          <div class="empty-icon"><i class="fa-solid fa-inbox"></i></div>
          <p class="empty-title">Nothing here yet</p>
          <p class="empty-sub">Your completed downloads will show up here</p>
        </div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="dlModalOverlay" aria-modal="true" role="dialog" aria-labelledby="dlModalTitle">
    <div class="modal">
      <div class="modal__head">
        <div class="modal__head-icon" id="dlModalIcon">
          <i class="fa-solid fa-arrow-down-to-bracket"></i>
        </div>
        <div class="modal__head-text">
          <span class="modal__title" id="dlModalTitle">Downloading...</span>
          <span class="modal__sub" id="dlModalSub">Preparing your file</span>
        </div>
        <button class="modal__close" id="dlModalClose" aria-label="Close">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal__body" id="dlProgressView">
        <div class="dl-pct-row">
          <span class="dl-pct" id="progressPercent">0%</span>
          <div class="dl-stats">
            <span id="progressSpeed" class="dl-stat"></span>
            <span class="dl-sep">·</span>
            <span id="progressBytes" class="dl-stat"></span>
            <span class="dl-sep">·</span>
            <span class="dl-stat dl-stat--label">ETA</span>
            <span id="progressEta" class="dl-stat"></span>
          </div>
        </div>
        <div class="progress-track-wrap">
          <div class="progress-track" id="progressTrack"
            role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-fill" id="progressFill">
              <div class="progress-fill__shine"></div>
            </div>
          </div>
        </div>
        <div class="dl-footer">
          <span class="dl-status" id="progressStatus">Starting...</span>
          <button class="cancel-btn" id="cancelBtn">
            <i class="fa-solid fa-stop"></i> Cancel
          </button>
        </div>
      </div>
      <div class="modal__body modal__body--result modal__body--hidden" id="dlResultView">
        <div class="result-icon-wrap">
          <i class="fa-solid fa-circle-check result-icon result-icon--success" id="resultIconSuccess"></i>
          <i class="fa-solid fa-circle-exclamation result-icon result-icon--error" id="resultIconError"></i>
        </div>
        <p class="result-msg" id="resultMessage">Download complete!</p>
        <p class="result-path" id="resultPath"></p>
        <div class="result-actions" id="resultActions">
          <button class="ghost-btn" id="openFileBtn">
            <i class="fa-solid fa-arrow-up-right-from-square"></i> Open File
          </button>
          <button class="ghost-btn" id="openFolderBtn">
            <i class="fa-solid fa-folder-open"></i> Show in Folder
          </button>
        </div>
        <button class="btn btn--primary btn--full" id="newDownloadBtn">
          <i class="fa-solid fa-plus"></i> New Download
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <i class="toast__icon fa-solid fa-circle-check"></i>
    <span class="toast__msg"></span>
  </div>

  <div class="drag-overlay" id="dragOverlay">
    <div class="drag-box">
      <i class="fa-solid fa-link drag-box__icon"></i>
      <p class="drag-box__text">Drop YouTube URL here</p>
    </div>
  </div>

  <script type="module" src="../../dist/renderer/app.js"></script>
</body>
</html>
